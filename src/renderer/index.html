<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LanTerm</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #1a1a1a;
        --surface: #252525;
        --elevated: #2a2a2a;
        --border: #3a3a3a;
        --border-subtle: #333333;
        --text-primary: #d4d4d4;
        --text-secondary: #cccccc;
        --text-muted: #bbbbbb;
        --text-dim: #777777;
        --text-faint: #666666;
        --text-faintest: #555555;
        --accent: #4a9eff;
        --accent-dim: rgba(74,158,255,0.15);
        --input-bg: #1a1a1a;
        --shadow: rgba(0,0,0,0.6);
        --overlay: rgba(0,0,0,0.55);
        --selection-bg: rgba(255,255,255,0.08);
        --hover-bg: rgba(255,255,255,0.05);
        --subtle-bg: rgba(255,255,255,0.03);

        --status-running: #23d18b;
        --status-dirty: #c8a84b;
        --status-ahead: #6b9fd4;
        --git-branch: #7a9f60;
        --destructive: #f14c4c;
        --lane-1: #4fc3f7;
        --lane-2: #81c784;
        --lane-3: #ffb74d;
        --lane-4: #f06292;
        --lane-5: #ce93d8;
        --lane-6: #80cbc4;
        --lane-7: #fff176;
        --lane-8: #ff8a65;
        --ref-head: #2a5a2a;
        --ref-tag: #6a4a2a;
        --ref-remote: #3a3a5a;
        --ref-detached: #4a3a6a;
        --ref-default: #2a4a6a;
        --git-modified: #c07a3a;
        --git-added: #5a8f5a;
        --git-deleted: #c05a5a;
        --git-renamed: #7a7ac0;
        --git-untracked: #666;
      }
      [data-theme="light"] {
        --bg: #f0f0f0;
        --surface: #ffffff;
        --elevated: #e8e8e8;
        --border: #cccccc;
        --border-subtle: #dddddd;
        --text-primary: #1a1a1a;
        --text-secondary: #333333;
        --text-muted: #444444;
        --text-dim: #666666;
        --text-faint: #888888;
        --text-faintest: #999999;
        --accent: #0066cc;
        --accent-dim: rgba(0,102,204,0.12);
        --input-bg: #ffffff;
        --shadow: rgba(0,0,0,0.2);
        --overlay: rgba(0,0,0,0.35);
        --selection-bg: rgba(0,0,0,0.08);
        --hover-bg: rgba(0,0,0,0.05);
        --subtle-bg: rgba(0,0,0,0.03);

        --status-running: #2e7d32;
        --status-dirty: #9a7b2d;
        --status-ahead: #2a6cb0;
        --git-branch: #3d7a28;
        --destructive: #d32f2f;
        --lane-1: #0288d1;
        --lane-2: #388e3c;
        --lane-3: #f57c00;
        --lane-4: #c2185b;
        --lane-5: #7b1fa2;
        --lane-6: #00796b;
        --lane-7: #f9a825;
        --lane-8: #d84315;
        --ref-head: #c8e6c9;
        --ref-tag: #ffe0b2;
        --ref-remote: #e8eaf6;
        --ref-detached: #e1bee7;
        --ref-default: #bbdefb;
        --git-modified: #e65100;
        --git-added: #2e7d32;
        --git-deleted: #c62828;
        --git-renamed: #283593;
        --git-untracked: #999;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
